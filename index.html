<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeToGo Dash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-white">
    <div id="app" class="flex flex-col h-screen bg-gradient-to-b from-[#B9A8E8] to-[#0A0A0A]">
        <!-- Header -->
        <header class="flex items-center justify-between px-6 py-4 bg-gradient-to-b from-[#B9A8E8] via-[#D98CC0] to-transparent">
            <div class="text-2xl font-bold text-white leading-tight">
                <span class="block">home</span>
                <span class="block">to go_</span>
            </div>
            <div class="text-sm font-medium text-white bg-black bg-opacity-20 px-3 py-1 rounded-full">
                Dash
            </div>
        </header>

        <!-- Chat Container -->
        <main class="flex-1 overflow-y-auto px-4 py-6">
            <div id="chat-container" class="max-w-2xl mx-auto space-y-4">
                <!-- Messages will be inserted here -->
            </div>
        </main>

        <!-- Input Area -->
        <div class="px-4 py-6 bg-black bg-opacity-50">
            <div class="max-w-2xl mx-auto space-y-4">
                <!-- Predefined Buttons -->
                <div id="button-container" class="grid grid-cols-2 gap-2">
                    <button class="intent-btn px-4 py-2 rounded-full border border-[#4A4A4C] text-sm font-medium hover:bg-[#1C1C1E] transition" data-intent="cheaper">
                        I want something cheaper
                    </button>
                    <button class="intent-btn px-4 py-2 rounded-full border border-[#4A4A4C] text-sm font-medium hover:bg-[#1C1C1E] transition" data-intent="nature">
                        I want something closer to nature
                    </button>
                    <button class="intent-btn px-4 py-2 rounded-full border border-[#4A4A4C] text-sm font-medium hover:bg-[#1C1C1E] transition" data-intent="pool">
                        I want to have indoor pool
                    </button>
                    <button class="intent-btn px-4 py-2 rounded-full border border-[#4A4A4C] text-sm font-medium hover:bg-[#1C1C1E] transition" data-intent="sights">
                        I want important sights at walking distance
                    </button>
                </div>

                <!-- Free Text Input -->
                <div class="flex gap-2">
                    <input
                        id="user-input"
                        type="text"
                        placeholder="Or type your message..."
                        class="flex-1 px-4 py-3 rounded-full bg-[#1C1C1E] border border-[#4A4A4C] text-white placeholder-[#9B9B9F] focus:outline-none focus:border-[#FF3FC0]"
                    >
                    <button
                        id="send-btn"
                        class="px-6 py-3 rounded-full bg-[#FF3FC0] text-white font-medium hover:bg-opacity-90 transition"
                    >
                        Send
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal (initially hidden) -->
    <div id="modal-overlay" class="hidden fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center">
        <div id="modal-content" class="bg-[#0A0A0A] rounded-2xl max-w-md w-full mx-4 max-h-[90vh] overflow-y-auto relative">
            <!-- Modal close button -->
            <button id="modal-close" class="absolute top-4 right-4 text-white text-2xl z-10 w-8 h-8 flex items-center justify-center rounded-full bg-black bg-opacity-40">
                &times;
            </button>

            <!-- Modal content will be inserted here -->
            <div id="modal-body" class="p-6 space-y-2"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
